name: Update NHL Rankings

on:
  schedule:
    - cron: "0 12 1 * *"
  workflow_dispatch:
    inputs:
      draft_year:
        description: "Draft year to scrape"
        required: true
        default: "2027"
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper
        env:
          EP_API_KEY: ${{ secrets.EP_API_KEY }}
          DRAFT_YEAR: ${{ github.event.inputs.draft_year }}
        run: |
          python scraper.py

      - name: Run ranker
        env:
          DRAFT_YEAR: ${{ github.event.inputs.draft_year }}
        run: |
          python ranker.py

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Automatic Ranking Update"
          git push
